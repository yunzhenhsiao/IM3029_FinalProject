<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDG 14: 海洋最後的呼救</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --danger: #ff4d4d;
        }

        body, html {
            margin: 0; padding: 0; overflow: hidden; height: 100vh;
            background: #000; /* 初始全黑 */
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            cursor: none;
        }

        /* 故事前導層 */
        #story-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #001a33 0%, #000 100%);
            color: white; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 5000;
            transition: opacity 2s ease; padding: 40px; text-align: center;
        }

        .story-text {
            font-size: 1.5rem; line-height: 2; margin-bottom: 30px;
            max-width: 600px; opacity: 0; transform: translateY(20px);
            transition: 1.5s ease;
        }

        .btn-start {
            padding: 15px 40px; font-size: 1.2rem; background: transparent;
            color: #00d4ff; border: 2px solid #00d4ff; border-radius: 50px;
            cursor: pointer; opacity: 0; transition: 0.5s;
        }
        .btn-start:hover { background: #00d4ff; color: #000; box-shadow: 0 0 20px #00d4ff; }

        /* 遊戲主背景 */
        #game-canvas {
            width: 100%; height: 100vh;
            background: linear-gradient(180deg, #005c97 0%, #000428 100%);
            background-size: 400% 400%;
            animation: oceanPulse 15s ease infinite;
            transition: filter 2s ease; /* 隨難度變暗 */
        }

        @keyframes oceanPulse {
            0% { background-position: 50% 0%; }
            50% { background-position: 50% 100%; }
            100% { background-position: 50% 0%; }
        }

        #fish {
            position: fixed; width: 70px; z-index: 1000;
            pointer-events: none; transition: transform 0.2s ease-out;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
            display: none; /* 故事結束前隱藏 */
        }

        .item { position: absolute; pointer-events: none; user-select: none; }
        .trash { filter: grayscale(0.6) drop-shadow(0 0 10px rgba(0,0,0,0.5)); }
        .seagrass { font-size: 45px; filter: drop-shadow(0 0 10px #2ecc71); }

        /* UI 面板 */
        #ui-layer {
            position: fixed; top: 20px; left: 20px; padding: 20px;
            background: var(--glass); backdrop-filter: blur(15px);
            border-radius: 20px; color: white; border: 1px solid rgba(255,255,255,0.2);
            z-index: 2000; width: 220px; display: none;
        }

        .hp-container { width: 100%; height: 10px; background: rgba(0,0,0,0.4); border-radius: 5px; margin: 10px 0; overflow: hidden; }
        #hp-bar { width: 100%; height: 100%; background: #2ecc71; transition: width 0.3s; }

        /* 結局彈窗 */
        #modal {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 350px;
            background: rgba(255, 255, 255, 0.95); padding: 30px;
            border-radius: 30px; text-align: center; z-index: 6000;
        }
    </style>
</head>
<body>

    <div id="story-overlay">
        <div class="story-text" id="t1">你是一條出生在 2026 年的小丑魚。</div>
        <div class="story-text" id="t2">你的祖輩說，大海曾經是純淨的藍色...</div>
        <div class="story-text" id="t3">但現在，透明的陷阱無處不在。</div>
        <button class="btn-start" id="start-btn" onclick="startGame()">開始你的生存挑戰</button>
    </div>

    <div id="game-canvas">
        <img id="fish" src="https://cdn-icons-png.flaticon.com/512/2911/2911183.png" alt="小魚">
        
        <div id="ui-layer">
            <h3 style="margin:0">生存挑戰：Level <span id="lv">1</span></h3>
            <div class="hp-container"><div id="hp-bar"></div></div>
            <div style="font-size: 0.9rem; display: flex; justify-content: space-between;">
                <span>時間: <span id="timer">0</span>s</span>
                <span>HP: <span id="hp-text">100</span>%</span>
            </div>
        </div>
    </div>

    <div id="modal">
        <h2 id="m-title">生命消逝...</h2>
        <div id="m-icon" style="font-size: 60px; margin: 15px;"></div>
        <p id="m-desc" style="color: #555;"></p>
        <p id="m-time" style="color: var(--danger); font-weight: bold; font-size: 1.2rem;"></p>
        <hr>
        <p id="m-rank" style="font-style: italic; color: #888;"></p>
        <button onclick="location.reload()" style="padding: 10px 20px; cursor:pointer; border-radius: 20px; border:none; background:#005c97; color:white;">重新投胎</button>
    </div>

    <script>
        const fish = document.getElementById('fish');
        const hpBar = document.getElementById('hp-bar');
        const hpText = document.getElementById('hp-text');
        const timerText = document.getElementById('timer');
        const canvas = document.getElementById('game-canvas');
        
        const trashDB = [
            { icon: '🥤', name: '塑膠飲管', time: '約 200 年', dmg: 25, info: '體積小但極難分解，常被海龜誤食塞住鼻孔。' },
            { icon: '🧴', name: '寶特瓶', time: '約 450 年', dmg: 35, info: '碎裂後會變成微塑膠，永遠留在海洋與你的體內。' },
            { icon: '🛍️', name: '塑膠袋', time: '10 - 1000 年', dmg: 30, info: '漂浮的它看起來像極了水母，是致命的誘惑。' },
            { icon: '😷', name: '口罩', time: '約 450 年', dmg: 20, info: '人類為了自保而丟棄的物品，卻成了我們的絞刑架。' }
        ];

        let hp = 100, seconds = 0, gameActive = false, items = [];

        // 故事文字依序浮現
        window.onload = () => {
            setTimeout(() => document.getElementById('t1').style.opacity = 1, 500);
            setTimeout(() => document.getElementById('t2').style.opacity = 1, 2500);
            setTimeout(() => document.getElementById('t3').style.opacity = 1, 4500);
            setTimeout(() => document.getElementById('start-btn').style.opacity = 1, 6000);
        };

        function startGame() {
            document.getElementById('story-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('story-overlay').style.display = 'none';
                document.getElementById('ui-layer').style.display = 'block';
                fish.style.display = 'block';
                gameActive = true;
                requestAnimationFrame(gameLoop);
            }, 2000);
        }

        // 監聽移動
        document.addEventListener('mousemove', (e) => {
            if (!gameActive) return;
            fish.style.left = (e.clientX - 35) + 'px';
            fish.style.top = (e.clientY - 25) + 'px';
            if (e.movementX > 0) fish.style.transform = 'scaleX(1)';
            else if (e.movementX < 0) fish.style.transform = 'scaleX(-1)';
        });

        function createItem() {
            if (!gameActive) return;
            
            // 隨時間增加難度 (Level 1-3)
            let spawnCount = 1;
            if (seconds > 15) { spawnCount = 2; document.getElementById('lv').innerText = '2'; }
            if (seconds > 30) { 
                spawnCount = 3; 
                document.getElementById('lv').innerText = '3';
                canvas.style.filter = 'brightness(0.5) contrast(1.2)'; // 背景變暗
            }

            for(let i=0; i<spawnCount; i++) {
                const isHeal = Math.random() < 0.15;
                const div = document.createElement('div');
                div.className = 'item';
                let data = isHeal ? {type:'heal'} : {type:'trash', ...trashDB[Math.floor(Math.random()*trashDB.length)]};

                div.innerText = isHeal ? '🌿' : data.icon;
                div.classList.add(isHeal ? 'seagrass' : 'trash');
                div.style.fontSize = isHeal ? '40px' : (40 + Math.random() * 40) + 'px';
                
                const x = Math.random() * window.innerWidth;
                div.style.left = x + 'px';
                div.style.top = '-100px';
                document.body.appendChild(div);
                items.push({ el: div, x: x, y: -100, speed: 2 + Math.random() * 4, data });
            }
        }

        function gameLoop() {
            if (!gameActive) return;
            const fRect = fish.getBoundingClientRect();

            for (let i = items.length - 1; i >= 0; i--) {
                let it = items[i];
                it.y += it.speed;
                it.el.style.top = it.y + 'px';

                const iRect = it.el.getBoundingClientRect();
                if (fRect.left < iRect.right && fRect.right > iRect.left && fRect.top < iRect.bottom && fRect.bottom > iRect.top) {
                    if (it.data.type === 'heal') {
                        hp = Math.min(100, hp + 20);
                    } else {
                        hp -= it.data.dmg;
                        if (hp <= 0) gameOver(it.data);
                    }
                    updateUI();
                    it.el.remove();
                    items.splice(i, 1);
                    continue;
                }
                if (it.y > window.innerHeight) { it.el.remove(); items.splice(i, 1); }
            }
            requestAnimationFrame(gameLoop);
        }

        function updateUI() {
            hpBar.style.width = hp + '%';
            hpText.innerText = Math.max(0, hp);
            if (hp < 30) hpBar.style.background = '#ff4d4d';
        }

        function gameOver(d) {
            gameActive = false;
            document.getElementById('modal').style.display = 'block';
            document.getElementById('m-icon').innerText = d.icon;
            document.getElementById('m-title').innerText = `你死於人類的「${d.name}」`;
            document.getElementById('m-desc').innerText = d.info;
            document.getElementById('m-time').innerText = `這東西會留在你家裡：${d.time}`;
            
            let rank = "";
            if (seconds < 10) rank = "【海洋初學者】生命還沒開始，就已被人類的便利性終結。";
            else if (seconds < 30) rank = "【生存者】你奮力躲避，但大海已不再是你記憶中的樣子。";
            else rank = "【海洋鬥士】你的強韌讓人驚嘆，但僅靠躲避無法改變命運。";
            document.getElementById('m-rank').innerText = rank;
        }

        setInterval(createItem, 600);
        setInterval(() => { if (gameActive) { seconds++; timerText.innerText = seconds; } }, 1000);
    </script>
</body>
</html>

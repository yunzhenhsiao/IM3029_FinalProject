<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDG 14: 海洋守護者行動</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.15);
            --ocean-dark: #001a33;
            --beach-sand: #f3e5ab;
        }

        body, html { margin: 0; padding: 0; overflow: hidden; height: 100vh; font-family: 'PingFang TC', sans-serif; cursor: none; }

        /* --- 1. 故事前導層 --- */
        #story-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #001a33 0%, #000 100%);
            color: white; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 5000;
            transition: opacity 1.5s; text-align: center;
        }
        .story-text { font-size: 1.4rem; line-height: 2.5; margin-bottom: 20px; opacity: 0; transition: 1s; }

        /* --- 2. 遊戲場景：深海 (Stage 1) --- */
        #stage-sea {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(180deg, #005c97 0%, #000428 100%);
            display: none;
        }

        /* --- 3. 遊戲場景：沙灘 (Stage 2) --- */
        #stage-beach {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #87CEEB 0%, #f3e5ab 70%, #d2b48c 100%);
            display: none; flex-wrap: wrap; align-content: flex-end; padding: 50px;
        }

        #fish { position: fixed; width: 70px; z-index: 1000; pointer-events: none; transition: transform 0.2s; display: none; }

        /* 物件樣式 */
        .item { position: absolute; cursor: pointer; user-select: none; }
        .beach-trash { 
            position: relative; margin: 20px; transition: transform 0.3s, opacity 0.3s;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2));
        }
        .floating-bag { animation: floatBag 4s ease-in-out infinite; }
        @keyframes floatBag { 
            0%, 100% { transform: translate(0, 0) rotate(0deg); } 
            50% { transform: translate(15px, -15px) rotate(10deg); } 
        }

        /* --- UI & Modals --- */
        #ui-layer {
            position: fixed; top: 20px; left: 20px; padding: 15px;
            background: var(--glass); backdrop-filter: blur(10px);
            border-radius: 15px; color: white; z-index: 2000; display: none;
        }
        .hp-bar-bg { width: 150px; height: 10px; background: rgba(0,0,0,0.3); border-radius: 5px; }
        #hp-fill { width: 100%; height: 100%; background: #2ecc71; border-radius: 5px; transition: 0.3s; }

        .modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 380px; background: white; padding: 30px; border-radius: 25px; text-align: center; z-index: 6000;
            box-shadow: 0 15px 50px rgba(0,0,0,0.4);
        }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        button { padding: 10px 20px; border-radius: 30px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-blue { background: #005c97; color: white; }
        .btn-green { background: #27ae60; color: white; }

        /* 證書樣式 */
        #certificate {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 500px; background: #fffdf0; border: 10px double #d4af37; padding: 40px;
            text-align: center; z-index: 7000; color: #333;
        }

        #custom-cursor {
            position: fixed; width: 40px; height: 40px; border: 2px solid white; border-radius: 50%;
            pointer-events: none; z-index: 9999; mix-blend-mode: difference; display: none;
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <div id="story-overlay">
        <p class="story-text" id="s1">2026 年，海洋不再平靜。</p>
        <p class="story-text" id="s2">你將成為這場生態危機的見證者...</p>
        <button class="btn-blue" style="opacity:0; transition: 1s;" id="start-btn" onclick="startSeaStage()">進入深海生存</button>
    </div>

    <div id="stage-sea">
        <img id="fish" src="https://cdn-icons-png.flaticon.com/512/2911/2911183.png">
        <div id="ui-layer">
            <h3 style="margin:0">生存挑戰</h3>
            <div class="hp-bar-bg"><div id="hp-fill"></div></div>
            <p>存活: <span id="sea-timer">0</span>s</p>
        </div>
    </div>

    <div id="stage-beach">
        <div style="position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-size: 1.5rem; font-weight: bold; color: #003366;">
            [ 行動：清理沙灘上的垃圾 ] 剩餘數量：<span id="trash-count">0</span>
        </div>
    </div>

    <div id="modal-death" class="modal">
        <h2 id="death-title"></h2>
        <p id="death-info"></p>
        <p style="color:red; font-weight:bold" id="death-time"></p>
        <div class="btn-group">
            <button class="btn-blue" onclick="location.reload()">重新投胎</button>
            <button class="btn-green" onclick="startBeachStage()">拯救地球行動</button>
        </div>
    </div>

    <div id="certificate">
        <h1 style="color: #d4af37;">海洋守護冠軍</h1>
        <p>恭喜你，勇敢的守護者！</p>
        <p>你已成功清理沙灘廢棄物，為海洋生物換回一片純淨的棲息地。</p>
        <div style="margin: 30px 0; border-top: 1px solid #ddd; padding-top: 20px;">
            <p>簽署人：SDG 14 組織</p>
        </div>
        <button class="btn-blue" onclick="location.reload()">回到主畫面</button>
    </div>

    <script>
        const trashDB = [
            { icon: '🥤', name: '塑膠飲管', time: '約 200 年', dmg: 35, info: '吸管常被海龜誤食塞住鼻孔。' },
            { icon: '🧴', name: '寶特瓶', time: '約 450 年', dmg: 50, info: '碎裂後會變成微塑膠進入食物鏈。' },
            { icon: '🛍️', name: '膠袋', time: '10 - 1000 年', dmg: 40, info: '看起來像極了水母，是海龜的致命陷阱。' },
            { icon: '😷', name: '口罩', time: '約 450 年', dmg: 30, info: '耳帶容易纏繞海洋生物造成溺斃。' },
            { icon: '🥫', name: '汽水罐', time: '約 100 年', dmg: 25, info: '在海中需要百年才能鏽蝕分解。' }
        ];

        let hp = 100, seaSeconds = 0, gameActive = false, seaItems = [], currentStage = 'story';
        const cursor = document.getElementById('custom-cursor');

        // 滑鼠跟隨
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 20 + 'px';
            cursor.style.top = e.clientY - 20 + 'px';
            if(currentStage === 'sea' && gameActive) {
                const fish = document.getElementById('fish');
                fish.style.left = e.clientX - 35 + 'px';
                fish.style.top = e.clientY - 35 + 'px';
                if (e.movementX > 0) fish.style.transform = 'scaleX(1)';
                else if (e.movementX < 0) fish.style.transform = 'scaleX(-1)';
            }
        });

        // 故事文字
        setTimeout(() => document.getElementById('s1').style.opacity = 1, 500);
        setTimeout(() => document.getElementById('s2').style.opacity = 1, 2000);
        setTimeout(() => document.getElementById('start-btn').style.opacity = 1, 3500);

        function startSeaStage() {
            currentStage = 'sea';
            document.getElementById('story-overlay').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('story-overlay').style.display = 'none';
                document.getElementById('stage-sea').style.display = 'block';
                document.getElementById('ui-layer').style.display = 'block';
                document.getElementById('fish').style.display = 'block';
                cursor.style.display = 'block';
                gameActive = true;
                requestAnimationFrame(seaLoop);
            }, 1500);
        }

        function createSeaItem() {
            if(!gameActive || currentStage !== 'sea') return;
            const isHeal = Math.random() < 0.15;
            const div = document.createElement('div');
            div.className = 'item';
            let data = isHeal ? {type:'heal'} : {type:'trash', ...trashDB[Math.floor(Math.random()*trashDB.length)]};
            div.innerText = isHeal ? '🌿' : data.icon;
            div.style.fontSize = isHeal ? '40px' : (50 + Math.random()*40) + 'px';
            const x = Math.random() * window.innerWidth;
            div.style.left = x + 'px'; div.style.top = '-100px';
            document.body.appendChild(div);
            seaItems.push({ el: div, x, y: -100, speed: 3 + Math.random()*3, data });
        }
        setInterval(createSeaItem, 600);
        setInterval(() => { if(gameActive && currentStage === 'sea') { seaSeconds++; document.getElementById('sea-timer').innerText = seaSeconds; }}, 1000);

        function seaLoop() {
            if(!gameActive) return;
            const fRect = document.getElementById('fish').getBoundingClientRect();
            for (let i = seaItems.length - 1; i >= 0; i--) {
                let it = seaItems[i];
                it.y += it.speed; it.el.style.top = it.y + 'px';
                const iRect = it.el.getBoundingClientRect();
                if(fRect.left < iRect.right && fRect.right > iRect.left && fRect.top < iRect.bottom && fRect.bottom > iRect.top) {
                    if(it.data.type === 'heal') hp = Math.min(100, hp + 20);
                    else { hp -= it.data.dmg; if(hp <= 0) showDeathModal(it.data); }
                    document.getElementById('hp-fill').style.width = hp + '%';
                    it.el.remove(); seaItems.splice(i, 1); continue;
                }
                if(it.y > window.innerHeight) { it.el.remove(); seaItems.splice(i, 1); }
            }
            requestAnimationFrame(seaLoop);
        }

        function showDeathModal(d) {
            gameActive = false;
            document.getElementById('modal-death').style.display = 'block';
            document.getElementById('death-title').innerText = `誤食了 ${d.name}`;
            document.getElementById('death-info').innerText = d.info;
            document.getElementById('death-time').innerText = `分解年限：${d.time}`;
            document.body.style.cursor = 'default';
        }

        // --- 第二關邏輯 ---
        function startBeachStage() {
            currentStage = 'beach';
            gameActive = false;
            document.getElementById('modal-death').style.display = 'none';
            document.getElementById('stage-sea').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('stage-beach').style.display = 'flex';
            
            // 生成沙灘垃圾
            const beach = document.getElementById('stage-beach');
            let count = 15;
            document.getElementById('trash-count').innerText = count;

            for(let i=0; i<count; i++) {
                const data = trashDB[Math.floor(Math.random()*trashDB.length)];
                const div = document.createElement('div');
                div.className = 'item beach-trash';
                if(data.icon === '🛍️') div.classList.add('floating-bag'); // 塑膠袋靈動效果
                div.innerText = data.icon;
                div.style.fontSize = '80px';
                div.onclick = () => {
                    div.style.opacity = '0';
                    div.style.transform = 'scale(0)';
                    setTimeout(() => {
                        div.remove();
                        count--;
                        document.getElementById('trash-count').innerText = count;
                        if(count === 0) showCertificate();
                    }, 300);
                };
                beach.appendChild(div);
            }
        }

        function showCertificate() {
            document.getElementById('certificate').style.display = 'block';
        }
    </script>
</body>
</html>
